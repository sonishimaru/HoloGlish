# これは編集可能な「種」データです。デビュー・卒業に合わせて自由に追加・削除してください。
# channel_id は YouTube チャンネルの UCxxxx 形式ID。
#   - 取得方法: 対象チャンネルの「概要」→ URL共有、または about ページのソースから UC... を確認。
