name: Scheduled Collect

# HoloGlish の字幕を定期的に自動収集し、生成した索引(DB)を専用ブランチ
# `hologlish-data` に蓄積する。main の作業ツリーは汚さない。
# （このワークフローを GitHub に確実に登録・有効化するための再登録済み）
#
# 注意: GitHub ランナーの IP は YouTube に bot 判定されやすい。安定運用には
# リポジトリ Secret `YT_COOKIES`（ブラウザから書き出した Netscape 形式 cookies）
# を設定すると緩和できる。未設定でも動くが 429 / Sign-in 要求で一部失敗しうる。

on:
  schedule:
    # 6時間ごと。1実行あたり各チャンネル最大 limit 本を収集し、確実に公開する。
    # 全アーカイブは繰り返し実行（再開可能）で未取得分を積み上げて到達する。
    # ※上限なしにするとジョブがタイムアウトし、末尾の公開ステップが走らず
    #   その実行の収集分が失われるため、必ず1実行を区切る設計にしている。
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "対象ブランチ (jp/en/id)。空なら全ブランチ"
        required: false
        default: ""
      members:
        description: "カンマ区切りのメンバー名で絞り込み（任意）"
        required: false
        default: ""
      limit:
        description: "1実行あたりのチャンネル別取得本数（既定30。タイムアウトで消えないよう区切る）"
        required: false
        default: "30"
      sleep:
        description: "動画間の待機秒（レート制限対策）。cookies併用のため既定1.5"
        required: false
        default: "1.5"

# 索引を hologlish-data ブランチへ push するために書き込み権限が必要
permissions:
  contents: write

concurrency:
  group: hologlish-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # 全アーカイブ収集は長時間になりうるが、再開可能なので途中で切れても次回続行
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore accumulated index
        run: |
          mkdir -p data
          if git fetch origin hologlish-data:hologlish-data 2>/dev/null; then
            git show hologlish-data:hologlish.db > data/hologlish.db \
              && echo "既存の索引を復元しました" \
              || echo "索引ファイルが見つからないため新規作成します"
          else
            echo "hologlish-data ブランチが無いため新規作成します"
          fi

      - name: Prepare cookies (optional)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > "$RUNNER_TEMP/cookies.txt"
            echo "HOLOGLISH_COOKIES=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_ENV"
            echo "cookies を設定しました"
          else
            echo "cookies 未設定（bot 判定リスクあり）のまま続行します"
          fi

      - name: Collect subtitles
        env:
          # 1実行あたり各チャンネル最大 LIMIT 本（既定30）。再開可能で繰り返し積み上げる。
          BRANCH: ${{ inputs.branch }}
          MEMBERS: ${{ inputs.members }}
          LIMIT: ${{ inputs.limit || '30' }}
          SLEEP: ${{ inputs.sleep || '1.5' }}
        run: |
          python -m pipeline.run collect \
            ${BRANCH:+--branch "$BRANCH"} \
            ${MEMBERS:+--members "$MEMBERS"} \
            --limit "$LIMIT" \
            --sleep "$SLEEP" --retries 4 --retry-base 5

      # 収集ステップが途中で失敗しても、それまでの索引は公開する（データ保全）
      - name: Publish index to hologlish-data branch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pub="$RUNNER_TEMP/pub"
          rm -rf "$pub" && mkdir -p "$pub"
          cp data/hologlish.db "$pub/hologlish.db"
          cat > "$pub/README.md" <<'EOF'
          # HoloGlish 収集索引（自動更新）

          このブランチは `Scheduled Collect` ワークフローが自動生成する
          SQLite 索引 `hologlish.db` を保持します。手で編集しないでください。

          利用側:
          ```bash
          git fetch origin hologlish-data
          git show hologlish-data:hologlish.db > data/hologlish.db
          uvicorn server.app:app
          ```
          EOF
          cd "$pub"
          git init -q
          git checkout -q -b hologlish-data
          git add hologlish.db README.md
          git commit -q -m "索引を更新 ($(date -u +%Y-%m-%dT%H:%MZ))"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -q -f origin hologlish-data
          echo "hologlish-data ブランチへ索引を公開しました"
