name: Scheduled Collect

# HoloGlish の字幕を収集し、生成した索引(DB)を専用ブランチ `hologlish-data`
# に蓄積する。main の作業ツリーは汚さない。
#
# 【重要】GitHub のクラウドIPは YouTube に IP レベルでブロックされ、
# 字幕取得（yt-dlp・youtube-transcript-api とも）が通らないことが判明した。
# そのため **クラウドの定期スケジュールは無効化** している。
# 収集は「住宅IPの自分のPC」で `scripts/collect_local.sh` を実行するか、
# 自宅回線に登録した **セルフホストrunner**（runs-on: self-hosted）で行う。
# このワークフローは手動実行(workflow_dispatch)用に残している
# （セルフホストrunner を使う場合は下の runs-on を self-hosted に変更）。

on:
  # クラウドIPがブロックされるため schedule は無効化（住宅IPで実行する）。
  # セルフホストrunner を自宅に登録したら、下の cron を復活させて自動化できる。
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: "対象ブランチ (jp/en/id)。空なら全ブランチ"
        required: false
        default: ""
      members:
        description: "カンマ区切りのメンバー名で絞り込み（任意）"
        required: false
        default: ""
      limit:
        description: "1実行でチャンネル別に新規処理する本数の上限（既定30。繰り返しで奥へ前進）"
        required: false
        default: "30"
      list_depth:
        description: "列挙する本数（新しい順）。0で全件＝過去アーカイブへ到達（既定0）"
        required: false
        default: "0"
      sleep:
        description: "動画間の待機秒（レート制限対策）。cookies併用のため既定1.5"
        required: false
        default: "1.5"
      time_budget:
        description: "収集の時間予算（秒）。ジョブ上限より手前で区切り公開に到達させる（既定18000=5時間）"
        required: false
        default: "18000"
      subs_source:
        description: "字幕取得経路 ytdlp/api/both（bot判定回避のフォールバック。既定both）"
        required: false
        default: "both"
      player_clients:
        description: "yt-dlp の innertube クライアント（カンマ区切り）。default で既定。bot判定回避用"
        required: false
        default: ""

# 索引を hologlish-data ブランチへ push するために書き込み権限が必要
permissions:
  contents: write

concurrency:
  group: hologlish-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # 全アーカイブ収集は長時間になりうるが、再開可能なので途中で切れても次回続行
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore accumulated index
        run: |
          mkdir -p data
          if git fetch origin hologlish-data:hologlish-data 2>/dev/null; then
            git show hologlish-data:hologlish.db > data/hologlish.db \
              && echo "既存の索引を復元しました" \
              || echo "索引ファイルが見つからないため新規作成します"
          else
            echo "hologlish-data ブランチが無いため新規作成します"
          fi

      - name: Prepare cookies (optional)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > "$RUNNER_TEMP/cookies.txt"
            echo "HOLOGLISH_COOKIES=$RUNNER_TEMP/cookies.txt" >> "$GITHUB_ENV"
            echo "cookies を設定しました"
          else
            echo "cookies 未設定（bot 判定リスクあり）のまま続行します"
          fi

      # 【早期公開】収集の前に、各チャンネルの全動画を軽量列挙して台帳(母集合)を
      # 最新化し、収集状況 coverage.json を先に公開する。これにより長い収集の完了を
      # 待たずに、スプレッドシートへ「未収集」を含む一覧が数分〜十数分で反映される。
      - name: Refresh catalog (collection coverage)
        env:
          BRANCH: ${{ inputs.branch }}
          MEMBERS: ${{ inputs.members }}
        run: |
          python -m pipeline.run catalog \
            ${BRANCH:+--branch "$BRANCH"} \
            ${MEMBERS:+--members "$MEMBERS"} \
            --sleep 1 --retries 3 --retry-base 5 || echo "catalog 更新をスキップ（続行）"

      - name: Build coverage.json (early)
        if: always()
        run: |
          python -m pipeline.run coverage --out data/coverage.json || echo "coverage 生成をスキップ（続行）"

      - name: Publish coverage early
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish_data.sh

      - name: Collect subtitles
        env:
          # 1実行あたり各チャンネル最大 LIMIT 本（既定30）。再開可能で繰り返し積み上げる。
          BRANCH: ${{ inputs.branch }}
          MEMBERS: ${{ inputs.members }}
          LIMIT: ${{ inputs.limit || '30' }}
          # 列挙は全件(0)。処理量は LIMIT・時間予算で制御し、繰り返し実行で
          # 過去アーカイブの奥へ前進する（新しい側から順に処理済みをスキップ）。
          LIST_DEPTH: ${{ inputs.list_depth || '0' }}
          SLEEP: ${{ inputs.sleep || '1.5' }}
          # ジョブ上限(350分=21000秒)より手前で区切り、必ず公開ステップに到達させる。
          # 収集は再開可能なので、繰り返し実行で未取得分を積み上げる。
          TIME_BUDGET: ${{ inputs.time_budget || '18000' }}
          # 字幕取得経路（bot判定回避）。both=yt-dlp→api フォールバック。
          SUBS_SOURCE: ${{ inputs.subs_source || 'both' }}
          # yt-dlp の innertube クライアント切替（bot判定回避）。空なら pipeline 既定。
          HOLOGLISH_PLAYER_CLIENTS: ${{ inputs.player_clients }}
        run: |
          python -m pipeline.run collect \
            ${BRANCH:+--branch "$BRANCH"} \
            ${MEMBERS:+--members "$MEMBERS"} \
            --limit "$LIMIT" --list-depth "$LIST_DEPTH" --time-budget "$TIME_BUDGET" \
            --subs-source "$SUBS_SOURCE" \
            --sleep "$SLEEP" --retries 4 --retry-base 5

      # 収集分を反映して coverage.json を作り直す
      - name: Rebuild coverage.json
        if: always()
        run: |
          python -m pipeline.run coverage --out data/coverage.json || echo "coverage 生成をスキップ（続行）"

      # 収集ステップが途中で失敗しても、それまでの索引・収集状況は公開する（データ保全）
      - name: Publish index to hologlish-data branch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish_data.sh
